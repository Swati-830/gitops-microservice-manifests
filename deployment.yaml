apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-microservice
  namespace: swati
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: gitops-microservice
  template:
    metadata:
      labels:
        app: gitops-microservice
    spec:
      containers:
        - name: gitops-microservice
          image: swati9455/gitops-microservice-demo:d4271ae
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: VERSION
              value: "v2"
            - name: ENV
              value: "development"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
